# H2 em arquivo — persiste em ./data/ quando o app roda a partir de api/ (diretório de trabalho)
spring:
  application:
    name: scorecast-api
  datasource:
    url: jdbc:h2:file:./data/scorecast
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  file:
    name: ./logs/scorecast.log
  level:
    com.scorecast: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
