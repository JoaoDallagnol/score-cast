name: Build Windows (EXE)

on:
  push:
    tags:
      - 'win-v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Copy Frontend to Spring Boot static resources
        run: |
          New-Item -ItemType Directory -Force -Path api/src/main/resources/static
          Copy-Item -Recurse -Force web/dist/* api/src/main/resources/static/

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build JAR
        working-directory: api
        run: mvn -B package -DskipTests

      - name: Generate EXE with jpackage
        run: |
          jpackage `
            --input api/target `
            --main-jar scorecast-api-0.0.1-SNAPSHOT.jar `
            --main-class com.scorecast.ScoreCastLauncher `
            --name ScoreCast `
            --app-version 1.0.0 `
            --type exe `
            --win-shortcut `
            --win-menu `
            --dest output `
            --java-options "-Dspring.profiles.active=prod"

      - name: Create Desktop Shortcut
        run: |
          $exePath = Get-ChildItem output/*.exe | Select-Object -First 1
          $WshShell = New-Object -ComObject WScript.Shell
          $shortcut = $WshShell.CreateShortcut("$env:USERPROFILE\Desktop\ScoreCast.lnk")
          $shortcut.TargetPath = $exePath.FullName
          $shortcut.WorkingDirectory = $exePath.DirectoryName
          $shortcut.Description = "ScoreCast - Gerenciador de Campeonatos"
          $shortcut.Save()
          Write-Host "Atalho criado na Área de Trabalho"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.exe
          name: ${{ github.ref_name }}
