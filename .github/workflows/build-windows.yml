name: Build Windows (EXE)

on:
  push:
    tags:
      - 'win-v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Copy Frontend to Spring Boot static resources
        run: |
          New-Item -ItemType Directory -Force -Path api/src/main/resources/static
          Copy-Item -Recurse -Force web/dist/* api/src/main/resources/static/

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build JAR
        working-directory: api
        run: mvn -B package -DskipTests

      - name: Create Runtime with jlink
        run: |
          jlink --add-modules java.base,java.logging,java.sql,java.naming,java.desktop,java.management,java.net.http `
                --output runtime `
                --strip-debug `
                --compress=2

      - name: Create EXE with jpackage
        run: |
          jpackage `
            --input api/target `
            --main-jar scorecast-api-0.0.1-SNAPSHOT.jar `
            --main-class com.scorecast.ScoreCastLauncher `
            --name ScoreCast `
            --app-version 1.0.0 `
            --type exe `
            --runtime-image runtime `
            --win-shortcut `
            --win-menu `
            --dest output

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.exe
          name: ${{ github.ref_name }}
